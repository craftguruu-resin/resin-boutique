<!DOCTYPE html>
<html lang="en" data-bill-api-base="http://127.0.0.1:3847" data-bill-api-port="3847" data-bill-api-secret="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raw materials — Craftguru vendor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor-saas.css" />
</head>
<body class="vendor-saas" data-vendor-nav="raw">
  <div class="vs-app">
    <div id="vsSidebarMount"></div>
    <div class="vs-main">
      <header class="vs-topbar">
        <div>
          <h1 class="vs-topbar__title">Resin raw materials</h1>
          <p class="vs-topbar__sub">
            Add materials for the guest “Resin raw material” page. Base category filters can be wired later; for now each row is name, description, optional note, and a photo.
          </p>
        </div>
        <div class="vs-topbar__actions">
          <button type="button" class="vs-btn" id="vrmRefresh">Refresh</button>
        </div>
      </header>
      <div class="vs-content">
        <div class="vs-card" style="margin-bottom: 1rem; padding: 0.85rem 1rem">
          <h2 class="vs-card__title" style="margin-top: 0">Add material</h2>
          <form id="vrmAddForm">
            <div class="vs-field">
              <label for="vrmName">Name</label>
              <input type="text" id="vrmName" name="name" maxlength="500" required />
            </div>
            <div class="vs-field" style="margin-top: 0.5rem">
              <label for="vrmDesc">Description</label>
              <textarea id="vrmDesc" name="description" rows="3" maxlength="4000" placeholder="What it is, pack size, safety notes…"></textarea>
            </div>
            <div class="vs-field" style="margin-top: 0.5rem">
              <label for="vrmNote">Short note (optional)</label>
              <input type="text" id="vrmNote" name="note" maxlength="300" />
            </div>
            <div class="vs-field" style="margin-top: 0.5rem">
              <label for="vrmImage">Photo</label>
              <input type="file" id="vrmImage" name="image" accept="image/jpeg,image/png,image/webp" required />
            </div>
            <div class="vs-row-actions" style="margin-top: 0.75rem">
              <button type="submit" class="vs-btn vs-btn--primary" id="vrmSubmit">Save material</button>
            </div>
          </form>
          <p id="vrmMsg" class="vs-muted" style="display: none; margin-top: 0.65rem"></p>
        </div>
        <div class="vs-card" style="padding: 0.85rem 1rem">
          <h2 class="vs-card__title" style="margin-top: 0">All rows</h2>
          <p id="vrmEmpty" class="vs-muted">Loading…</p>
          <div class="vs-table-wrap">
            <table class="vs-table" id="vrmTable" style="display: none">
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Name</th>
                  <th>Active</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="vrmTbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="vendor-shell.js"></script>
  <script src="vendor-raw-materials.js"></script>
</body>
</html>
