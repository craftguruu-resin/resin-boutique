<!DOCTYPE html>
<html lang="en" data-bill-api-base="http://127.0.0.1:3847" data-bill-api-port="3847" data-bill-api-secret="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero images — Craftguru vendor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor-saas.css" />
</head>
<body class="vendor-saas" data-vendor-nav="hero">
  <div class="vs-app">
    <div id="vsSidebarMount"></div>
    <div class="vs-main">
      <header class="vs-topbar">
        <div>
          <h1 class="vs-topbar__title">Homepage hero</h1>
          <p class="vs-topbar__sub">
            Upload showcase images for the guest homepage disc. Pick an animation preset per slide. Empty list keeps the default catalog hero.
          </p>
        </div>
      </header>
      <div class="vs-content">
        <div class="vs-card" style="margin-bottom: 1rem; padding: 0.85rem 1rem">
          <h2 class="vs-card__title" style="margin-top: 0">Add hero slide</h2>
          <form id="vhAddForm" class="vs-row-actions" style="flex-wrap: wrap; align-items: flex-end; gap: 0.75rem">
            <div class="vs-field" style="margin: 0">
              <label for="vhImage">Image</label>
              <input type="file" id="vhImage" name="image" accept="image/jpeg,image/png,image/webp" required />
            </div>
            <div class="vs-field" style="margin: 0; min-width: 12rem">
              <label for="vhAnim">Animation</label>
              <select id="vhAnim" name="animation">
                <option value="orbit">Orbit 3D</option>
                <option value="drift">Drift parallax</option>
                <option value="prism">Prism tone</option>
                <option value="glide">Glide float</option>
                <option value="bloom">Bloom pulse</option>
              </select>
            </div>
            <button type="submit" class="vs-btn vs-btn--primary" id="vhSubmit">Upload slide</button>
          </form>
          <p id="vhMsg" class="vs-muted" style="display: none; margin-top: 0.65rem"></p>
        </div>
        <div class="vs-card" style="padding: 0.85rem 1rem">
          <h2 class="vs-card__title" style="margin-top: 0">Current slides</h2>
          <p id="vhEmpty" class="vs-muted">Loading…</p>
          <ul id="vhList" style="list-style: none; margin: 0.5rem 0 0; padding: 0; display: flex; flex-direction: column; gap: 0.65rem"></ul>
        </div>
      </div>
    </div>
  </div>
  <script src="vendor-shell.js"></script>
  <script src="vendor-hero.js"></script>
</body>
</html>
