<!DOCTYPE html>
<!-- Local dev: Node API. Production same-origin: clear data-bill-api-base. BILL_API_SECRET: match checkout.html. -->
<html lang="en" data-bill-api-base="http://127.0.0.1:3847" data-bill-api-port="3847" data-bill-api-secret="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Returns — Craftguru vendor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor-saas.css" />
</head>
<body class="vendor-saas" data-vendor-nav="returns">
  <div class="vs-app">
    <div id="vsSidebarMount"></div>
    <div class="vs-main">
      <header class="vs-topbar">
        <div>
          <h1 class="vs-topbar__title">Return management</h1>
          <p class="vs-topbar__sub">Log return requests against an order, then approve, reject, or mark refunded.</p>
        </div>
        <div class="vs-topbar__actions">
          <button type="button" class="vs-btn" id="vrRefreshBtn">Refresh</button>
        </div>
      </header>

      <div class="vs-content">
        <div id="vrDeskSection">
          <div class="vs-card" style="margin-bottom: 1rem">
            <h2 class="vs-login__title" style="margin-top: 0">New return</h2>
            <div class="vs-field">
              <label for="vrOrderId">Order #</label>
              <input type="number" id="vrOrderId" min="10001" step="1" placeholder="10042" />
            </div>
            <div class="vs-field">
              <label for="vrReason">Reason</label>
              <textarea id="vrReason" placeholder="Customer request, damaged parcel, wrong item…"></textarea>
            </div>
            <div class="vs-field">
              <label for="vrRefund">Refund amount (optional)</label>
              <input type="number" id="vrRefund" min="0" step="0.01" />
            </div>
            <button type="button" class="vs-btn vs-btn--primary" id="vrCreateBtn">Create return</button>
          </div>

          <div class="vs-table-wrap">
            <table class="vs-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Order</th>
                  <th>Status</th>
                  <th>Reason</th>
                  <th>Refund</th>
                  <th>Updated</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="vrTbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="vendor-shell.js"></script>
  <script src="vendor-returns.js"></script>
</body>
</html>
